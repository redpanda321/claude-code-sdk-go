# golangci-lint config for claude-code-sdk-go
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/redpanda321/claude-code-sdk-go

issues:
  exclude-dirs:
    - .github
  exclude-rules:
    # Don't complain about unused params in interface implementations during carve-in
    - path: pkg/.+/doc\.go
      linters: [unused]
    # Allow underscored field names in test fixtures
    - path: _test\.go
      linters: [unused]
